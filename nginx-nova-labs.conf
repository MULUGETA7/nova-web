# Nginx Configuration for Nova Labs Frontend
# Location: /etc/nginx/sites-available/nova-labs
# Create symlink: sudo ln -s /etc/nginx/sites-available/nova-labs /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name 196.190.251.203;  # Replace with your domain if you have one

    root /home/ubuntu/nova-finall/nova-labs/build;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}

